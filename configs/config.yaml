# LPM SDK nastavení
lpm:
  module_id: 802
  version: 7
  det_compute_on_gpu: false
  det_num_threads: 1
  ocr_compute_on_gpu: false
  ocr_num_threads: 1

# Detekce
detection:
  backend: lpm              # lpm | mediapipe
  min_confidence: 0.4
  redetect_every_n: 15
  min_face_ratio: 0.03
  nms_iou_threshold: 0.3

# Tracker
tracker:
  type: csrt                # csrt | kcf | kalman
  lost_timeout: 20
  # Per-tracker config (volitelné — přepíše configs/trackers/<type>.yaml)
  config: configs/trackers/csrt.yaml

# Anonymizace (blur)
blur:
  method: pixelate          # pixelate | gaussian | blackout | none
  block: 18                 # pro pixelate
  ksize: 51                 # pro gaussian (liché číslo)
  color: [0, 0, 0]          # pro blackout (BGR)
  expand: 0.15              # rozšíření bboxu před anonymizací (zlomek strany)

# Vizualizace
visualisation:
  enabled: true
  show_bbox: true
  show_label: true
  bbox_color: [0, 255, 0]   # BGR
  bbox_thickness: 2
  font_scale: 0.5
  lost_bbox_color: [0, 0, 255]

# Vstup
input:
  type: auto                # auto | video | image | image_dir
  start_frame: 0
  end_frame: null           # null = do konce

# Výstup (lze kombinovat)
output:
  frames: data/output_frames
  video: null               # např. data/output.mp4 (null = nezapisovat)
  json: null                # např. data/output.json (null = nezapisovat)
  jpg_quality: 90
  video_codec: mp4v
