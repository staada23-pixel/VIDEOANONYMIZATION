lpm:
  sdk_root: null          # null = autodetekce; nebo absolutní cesta k LPM SDK rootu
  module_index: 0
  compute_on_gpu: false
  num_threads: 1

tracker:
  type: KCF               # KCF (jediná možnost zatím)

detector:
  confidence: 0.55        # min confidence pro YuNet (dříve 0.3 — pouštěl falešné detekce)
  min_face_size: 30
  max_aspect_ratio: 1.5
  nms_threshold: 0.3      # dodatečný NMS po YuNetu (odstraní duplicitní boxy)
  edge_margin: 0.02       # ghost boxy blíž než 2% od okraje = vyhodit

output:
  save_only_with_detections: true
  save_every_n_frames: 1
