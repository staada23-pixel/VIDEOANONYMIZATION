# Barvy v BGR formátu
colors:
  active: [0, 255, 0]      # zelená — detekovaný obličej
  lost: [0, 0, 255]        # červená — tracker ztratil objekt
  text: [255, 255, 255]    # bílá — text labelu

# Label formát
label:
  show_id: true
  show_confidence: true
  show_lost_count: true
  font_scale: 0.6